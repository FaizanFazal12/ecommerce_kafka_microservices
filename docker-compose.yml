# Local infrastructure for the e-commerce microservices platform.
# One command spins up the full event backbone: `docker compose up -d`
#
#   - Kafka (KRaft mode, no Zookeeper)  -> the event bus
#   - Postgres                          -> one logical DB per service (separate schemas/DBs)
#   - Redis                             -> idempotency fast-path cache + rate limiting
#   - Kafka UI                          -> inspect topics, partitions, consumer lag in the browser
#
# Services (order/payment/inventory/notification) are added here later, each as its own container.

services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"   # host clients (your services running on the host)
      - "9094:9094"   # internal listener (other containers)
    environment:
      # --- KRaft single-node config (broker + controller in one process) ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      # Single-node => replication factor 1 for internal topics
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Auto-create topics off: we declare them explicitly (good production hygiene)
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "ecommerce-kafka-cluster-001"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Creates the topics once, then exits. Keeps topic config as code.
  kafka-init:
    image: apache/kafka:3.7.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        KAFKA=/opt/kafka/bin
        BS="--bootstrap-server kafka:9094"
        create() { $$KAFKA/kafka-topics.sh $$BS --create --if-not-exists --topic "$$1" --partitions "$$2" --replication-factor 1; }
        # business topics (partitioned by order_id for per-order ordering)
        create orders.created       6
        create orders.confirmed     6
        create orders.cancelled     6
        create payments.completed   6
        create payments.failed      6
        create inventory.reserved   6
        create inventory.rejected   6
        # dead-letter topics (1 partition is fine; low volume)
        create orders.DLQ           1
        create payments.DLQ         1
        create inventory.DLQ        1
        echo "----- topics created -----"
        $$KAFKA/kafka-topics.sh $$BS --list

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
      POSTGRES_DB: ecommerce
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
      # bootstrap one database per service (database-per-service pattern)
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./.data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"   # open http://localhost:8080
    environment:
      KAFKA_CLUSTERS_0_NAME: ecommerce-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9094
      DYNAMIC_CONFIG_ENABLED: "true"
